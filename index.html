      <style>
      .hero-og-banner {
        width: 100%;
        height: 30vh;
        min-height: 180px;
        max-height: 320px;
        overflow: hidden;
        position: relative;
        margin-bottom: -4rem;
      }
      .hero-og-banner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        display: block;
        opacity: 0.55;
        filter: saturate(0.8);
      }
      .hero-og-banner::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 80%;
        background: linear-gradient(transparent, #09090b);
        pointer-events: none;
      }
      .hero-og-banner::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 30%;
        background: linear-gradient(#09090b, transparent);
        pointer-events: none;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="hero-og-banner"><img src="/hero-og.webp" alt="palette-ai" loading="eager" /></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  <script src="https://neenhouse.com/tech-panel.js" defer></script>
</body>
